# ============================================================
# Base Configuration — shared across all experiments
# ============================================================

# Reproducibility
seed: 2024
reproducibility: True
state: INFO                        # log verbosity: DEBUG / INFO / WARNING

# GPU
use_gpu: True                      # overridden to False on CPU-only machines automatically

# Evaluation metrics (Top-K ranking)
metrics: ['Recall', 'NDCG']
topk: [10, 20]
valid_metric: NDCG@10

# Evaluation strategy
# split is IGNORED when pre-split files exist (.train.inter / .valid.inter / .test.inter).
# RecBole detects those files automatically and loads them directly.
# order: TO stil applies — RecBole uses it to sort interactions within each
#   user's history when building sequences for sequential models.
# mode: full still applies — controls how candidates are ranked at eval time.
eval_args:
  split: {LS: valid_and_test}      # ignored with pre-split files; kept for fallback
  group_by: user
  order: TO                        # Temporal Order — sort history by timestamp
  mode: uni100                      
