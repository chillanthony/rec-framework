# ============================================================
# Dataset: Amazon Reviews 2023 — Video Games
# Source: https://amazon-reviews-2023.github.io/
# Category: Video_Games
# ============================================================
#
# Preprocessing required before use:
#   Raw Amazon 2023 JSON → RecBole .inter format
#   Required columns: user_id, item_id, timestamp
#   Run: python src/custom_datasets/preprocess_amazon.py \
#            --category Video_Games --year 2023
#
# Expected file: dataset/amazon-videogame-2023/amazon-videogame-2023.inter
# Format (tab-separated):
#   user_id:token  item_id:token  timestamp:float
# ============================================================

dataset: amazon-videogame-2023

# Field mapping (must match .inter file header)
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
TIME_FIELD: timestamp

# Only load interaction data (no item/user side info needed for SASRec)
load_col:
  inter: [user_id, item_id, timestamp]

# 5-core filtering (inherited from base.yaml — listed here for clarity)
user_inter_num_interval: '[5, inf)'
item_inter_num_interval: '[5, inf)'
