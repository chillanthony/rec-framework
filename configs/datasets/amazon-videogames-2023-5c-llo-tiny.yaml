# ============================================================
# Dataset: Amazon Reviews 2023 — Video Games (Tiny / Debug)
# Generated by: python scripts/make_tiny_dataset.py
#               (samples 200 users from amazon-videogames-2023-5c-llo)
# Purpose: fast local smoke-tests only — NOT for real experiments
# Files: dataset/amazon-videogames-2023-5c-llo-tiny/
#
# Debug overrides (CPU, 2 epochs, uni100 eval) are embedded here
# so that --dataset amazon-videogames-2023-5c-llo-tiny is the only
# flag needed for local testing.
# ============================================================

dataset: amazon-videogames-2023-5c-llo-tiny

# Field mapping (identical to the full dataset)
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
TIME_FIELD: timestamp
ITEM_LIST_ID_FIELD: item_id_list     # pre-built history sequence

# Load all columns present in the inter files
load_col:
  inter: [user_id, item_id, timestamp, item_id_list]

# Tell RecBole to load pre-split files:
#   amazon-videogames-2023-5c-llo-tiny.train.inter
#   amazon-videogames-2023-5c-llo-tiny.valid.inter
#   amazon-videogames-2023-5c-llo-tiny.test.inter
benchmark_filename: ['train', 'valid', 'test']

# ---- Debug / smoke-test settings ----------------------------------------
use_gpu: False

# Drastically reduce training time
epochs: 2
train_batch_size: 64
eval_batch_size: 64
stopping_step: 2

# Sampled evaluation (100 neg items per user) — ~100x faster than full ranking
eval_args:
  split: {LS: valid_and_test}
  group_by: user
  order: TO
  mode: uni100
