# ============================================================
# SASRec — Self-Attentive Sequential Recommendation
# Paper: Kang & McAuley, ICDM 2018
# RecBole model type: Sequential Recommender
# ============================================================

model: SASRec

# Model architecture
n_layers: 2                   # number of Transformer blocks
n_heads: 2                    # number of attention heads
hidden_size: 64               # embedding & hidden dimension (must equal embedding_size)
inner_size: 256               # feed-forward inner dimension (typically 4x hidden_size)
hidden_dropout_prob: 0.5      # dropout on hidden states
attn_dropout_prob: 0.5        # dropout on attention weights
hidden_act: gelu              # activation in FFN: gelu / relu / swish
layer_norm_eps: 1.0e-12
initializer_range: 0.02       # weight initialization std

# Sequence
MAX_ITEM_LIST_LENGTH: 50      # maximum history length (truncate older items)

# Loss
loss_type: CE                 # Cross-Entropy (softmax over all items); BPR also supported

# Optimization
epochs: 300
learning_rate: 1.0e-3
train_batch_size: 256
weight_decay: 0.0
