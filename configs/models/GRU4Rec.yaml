# ============================================================
# GRU4Rec — Gated Recurrent Unit for Session-based Recommendation
# Paper: Hidasi et al., ICLR 2016
# RecBole model type: Sequential Recommender
# ============================================================

model: GRU4Rec

# Model architecture
embedding_size: 64
hidden_size: 128
num_layers: 1
dropout_prob: 0.3

# Sequence
MAX_ITEM_LIST_LENGTH: 50

# Loss
loss_type: CE
train_neg_sample_args: ~          # explicitly null to disable default negative sampling

# Training
epochs: 300
train_batch_size: 2048
eval_batch_size: 2048
stopping_step: 15                  # early stopping patience
learning_rate: 1e-3
weight_decay: 0.0
grad_clip_norm: 5.0                # gradient clipping