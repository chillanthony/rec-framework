# ============================================================
# BERT4Rec — BERT for Sequential Recommendation
# Paper: Sun et al., CIKM 2019
# RecBole model type: Sequential Recommender
# ============================================================

model: BERT4Rec

# Model architecture
n_layers: 2
n_heads: 2
hidden_size: 64
inner_size: 256
hidden_dropout_prob: 0.2
attn_dropout_prob: 0.2
hidden_act: gelu
layer_norm_eps: 1.0e-12
initializer_range: 0.02

# BERT4Rec-specific
mask_ratio: 0.4               # fraction of items randomly masked per sequence

# Sequence
MAX_ITEM_LIST_LENGTH: 50

# Loss
loss_type: CE
train_neg_sample_args: ~      # explicitly null to disable default negative sampling

# Training
epochs: 300
train_batch_size: 2048
eval_batch_size: 2048
stopping_step: 15              # early stopping patience
learning_rate: 1e-4
weight_decay: 0.0
grad_clip_norm: 5.0                # gradient clipping
